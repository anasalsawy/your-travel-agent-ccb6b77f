name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/war-room/**"
      - "supabase/functions/foundry-connections/**"
      - "supabase/functions/foundry-agent-run/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:
    inputs:
      project_ref:
        description: "Supabase project ref (optional; overrides secret SUPABASE_PROJECT_REF)"
        required: false
        type: string
      functions:
        description: "Space-separated functions to deploy"
        required: false
        default: "war-room foundry-connections foundry-agent-run"
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ inputs.project_ref != '' && inputs.project_ref || secrets.SUPABASE_PROJECT_REF }}
      FUNCTIONS_TO_DEPLOY: ${{ inputs.functions != '' && inputs.functions || 'war-room foundry-connections foundry-agent-run' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        shell: bash
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "Missing project ref. Set workflow_dispatch input project_ref or secret SUPABASE_PROJECT_REF."
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Show Supabase CLI version
        run: supabase --version

      - name: Deploy selected functions
        shell: bash
        run: |
          echo "Deploying functions: ${FUNCTIONS_TO_DEPLOY}"
          for fn in ${FUNCTIONS_TO_DEPLOY}; do
            echo "Deploying function: ${fn}"
            supabase functions deploy "${fn}" --project-ref "${SUPABASE_PROJECT_REF}"
          done
